<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Волгоградская падел лига</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0f;
  --surface: #18181a;
  --border: rgba(255,255,255,0.08);
  --text: #f0ede8;
  --muted: #7a7975;
  --accent: #c8f060;
  --accent-dim: rgba(200,240,96,0.12);
  --green: #7dd87d;
  --red: #ff5f5f;
  --red-dim: rgba(255,95,95,0.1);
  --gold: #f5c842;
  --silver: #b0b8c4;
  --bronze: #d4845a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }

/* CONTAINER — фиксированная ширина */
.container { max-width: 900px; margin: 0 auto; }

/* NAV */
.nav { display: flex; border-bottom: 1px solid var(--border); }
.nav-btn {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 1rem 1.5rem; background: none; border: none;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.2s; margin-bottom: -1px;
}
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-btn:hover:not(.active) { color: var(--text); }

/* HEADER */
.header {
  padding: 2.5rem 1.5rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
}
.header-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.4rem, 4vw, 2.4rem); line-height: 1; }
.header-title span { color: var(--accent); }
.header-right { text-align: right; }
.last-update { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
.last-update strong { color: var(--accent); display: block; font-size: 14px; }
.refresh-btn {
  margin-top: 8px; background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  padding: 5px 12px; border-radius: 3px; cursor: pointer; transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* STATS */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: var(--border); border-bottom: 1px solid var(--border);
}
.stat-cell { background: var(--bg); padding: 1.2rem 1.5rem; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--accent); line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 3px; }

/* PAGE */
.page { display: none; }
.page.active { display: block; }

/* RATING TABLE */
.table-wrap { padding: 0 1.5rem 4rem; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
thead tr { border-bottom: 1px solid var(--border); }
th {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted); padding: 10px 12px 10px 0;
  text-align: left; font-weight: 400; white-space: nowrap;
}
th:first-child { width: 48px; text-align: center; padding-left: 12px; }
th.r { text-align: right; }
/* Кликабельные заголовки */
th.sortable {
  cursor: pointer; user-select: none;
}
th.sortable:hover { color: var(--text); }
th.sortable.asc::after  { content: ' ↑'; color: var(--accent); }
th.sortable.desc::after { content: ' ↓'; color: var(--accent); }

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; cursor: default; }
tbody tr:hover { background: rgba(255,255,255,0.025); }
tbody tr.top1 { background: rgba(245,200,66,0.06); }
tbody tr.top2 { background: rgba(176,184,196,0.05); }
tbody tr.top3 { background: rgba(212,132,90,0.05); }
td { padding: 13px 12px 13px 0; font-size: 14px; vertical-align: middle; }
td:first-child { text-align: center; padding-left: 12px; }

.place-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; }
.p1 { color: var(--gold); } .p2 { color: var(--silver); } .p3 { color: var(--bronze); }
.pn { color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
.pair-name { font-size: 15px; font-weight: 500; }
.elo-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; color: var(--accent); text-align: right; }
.mono { font-family: 'IBM Plex Mono', monospace; font-size: 13px; text-align: right; }
.col-wins { color: var(--green); } .col-losses { color: var(--red); }

.wr-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
.wr-bar { width: 50px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
.wr-fill { height: 100%; background: var(--accent); border-radius: 2px; }
.wr-pct { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); min-width: 30px; text-align: right; }

/* MATCHES */
.matches-wrap { padding: 0 1.5rem 4rem; }
.match-card {
  border: 1px solid var(--border); border-radius: 6px;
  margin-top: 1rem; overflow: hidden;
}
.match-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: var(--surface);
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted);
}
.match-body {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 1rem; padding: 16px 14px;
}
.match-pair { font-size: 14px; font-weight: 500; }
.match-pair.winner { color: var(--accent); }
.match-pair.loser { color: var(--muted); }
.match-pair.right { text-align: right; }
.match-score-wrap { text-align: center; }
.match-score { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--text); letter-spacing: 0.05em; }
.match-games { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }
.match-elo { font-family: 'IBM Plex Mono', monospace; font-size: 11px; margin-top: 4px; }
.elo-up { color: var(--green); } .elo-down { color: var(--red); }
.match-pair-col { display: flex; flex-direction: column; gap: 3px; }
.match-pair-col.right { align-items: flex-end; }

/* STATE */
.state { padding: 4rem 2rem; text-align: center; font-family: 'IBM Plex Mono', monospace; color: var(--muted); font-size: 13px; }
.state .big { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--border); display: block; margin-bottom: 1rem; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.err-msg { color: var(--red); }

/* CLICKABLE STAT CELLS IN TABLE */
.stat-clickable {
  cursor: pointer; border-radius: 3px; padding: 2px 4px; margin: -2px -4px;
  transition: background 0.15s;
}
.stat-clickable:hover { background: rgba(255,255,255,0.08); }
.col-wins .stat-clickable:hover { background: rgba(125,216,125,0.15); }
.col-losses .stat-clickable:hover { background: rgba(255,95,95,0.15); }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 100; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
@media (min-width: 641px) {
  .modal-overlay { align-items: center; }
}
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px 12px 0 0;
  width: 100%; max-width: 600px; max-height: 80vh; display: flex; flex-direction: column;
  overflow: hidden;
}
@media (min-width: 641px) {
  .modal { border-radius: 12px; max-height: 75vh; }
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.modal-title { font-family: 'IBM Plex Mono', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; }
.modal-title strong { color: var(--accent); display: block; font-size: 15px; font-family: 'IBM Plex Sans', sans-serif; text-transform: none; letter-spacing: 0; }
.modal-close {
  background: none; border: none; color: var(--muted); font-size: 20px;
  cursor: pointer; padding: 4px 8px; line-height: 1; transition: color 0.15s;
}
.modal-close:hover { color: var(--text); }
.modal-body { overflow-y: auto; padding: 12px 16px 20px; }
.modal-body .match-card { margin-top: 10px; }
.modal-body .match-card:first-child { margin-top: 0; }
.modal-empty { padding: 3rem; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); }

/* MOBILE */
@media (max-width: 640px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .header { padding: 1.5rem 1rem 1.2rem; }
  .table-wrap, .matches-wrap { padding-left: 0.75rem; padding-right: 0.75rem; }
  .hide-sm { display: none; }
  table { min-width: 0; }
  th, td { padding-left: 6px; padding-right: 6px; font-size: 13px; }
  .pair-name { font-size: 13px; }
  .elo-val { font-size: 1.1rem; }
  .match-body { gap: 0.4rem; padding: 12px 10px; }
  .match-pair { font-size: 12px; }
  .match-score { font-size: 1.3rem; }
}
</style>
</head>
<body>

<div class="container">

<div class="nav">
  <button class="nav-btn active" onclick="switchPage('rating', this)">🏆 Рейтинг</button>
  <button class="nav-btn" onclick="switchPage('matches', this)">📋 Матчи</button>
</div>

<div class="header">
  <div>
    <div class="header-title" id="page-subtitle">Волгоградская<br><span style="color:var(--accent)">падел лига</span></div>
  </div>
  <div class="header-right">
    <div class="last-update"><strong id="last-update">—</strong>обновлено</div>
    <button class="refresh-btn" onclick="loadAll()">↻ Обновить</button>
  </div>
</div>

<div class="stats-row">
  <div class="stat-cell"><div class="stat-val" id="s-pairs">—</div><div class="stat-lbl">Пар</div></div>
  <div class="stat-cell"><div class="stat-val" id="s-matches">—</div><div class="stat-lbl">Матчей</div></div>
  <div class="stat-cell"><div class="stat-val" id="s-leader-elo">—</div><div class="stat-lbl">Лучший ELO</div></div>
  <div class="stat-cell"><div class="stat-val" id="s-avg-elo">—</div><div class="stat-lbl">Средний ELO</div></div>
</div>

<!-- RATING PAGE -->
<div id="page-rating" class="page active">
  <div class="table-wrap">
    <div id="rating-state" class="state"><div class="spinner"></div>Загружаем рейтинг...</div>
    <table id="rating-table" style="display:none">
      <thead><tr>
        <th>#</th><th>Пара</th>
        <th class="r">ELO</th>
        <th class="r hide-sm sortable" data-col="wins"    onclick="sortBy('wins')">Победы</th>
        <th class="r hide-sm sortable" data-col="losses"  onclick="sortBy('losses')">Поражения</th>
        <th class="r hide-sm sortable" data-col="matches" onclick="sortBy('matches')">Матчи</th>
        <th class="r hide-sm">% побед</th>
      </tr></thead>
      <tbody id="rating-tbody"></tbody>
    </table>
  </div>
</div>

<!-- MATCHES PAGE -->
<div id="page-matches" class="page">
  <div class="matches-wrap">
    <div id="matches-state" class="state"><div class="spinner"></div>Загружаем матчи...</div>
    <div id="matches-list"></div>
  </div>
</div>

</div><!-- /container -->

<!-- PAIR MATCHES MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">
        <span id="modal-filter-label">Матчи</span>
        <strong id="modal-pair-name">—</strong>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const SHEET_ID = '1ckry8Tz1CDlTMvZ_Kh0wUtmKqkWLnNWsbOj82-cex7s';

// Sorting state
let ratingData = [];
let matchesData = []; // all parsed matches
let sortCol = null;   // 'wins' | 'losses' | 'matches'
let sortDir = 'desc'; // 'asc' | 'desc'

function openModal(pair, filter) {
  const labels = { wins: 'Победы', losses: 'Поражения', all: 'Все матчи' };
  document.getElementById('modal-pair-name').textContent = pair;
  document.getElementById('modal-filter-label').textContent = labels[filter] || 'Матчи';

  const filtered = matchesData.filter(m => {
    const involved = m.pairA === pair || m.pairB === pair;
    if (!involved) return false;
    if (filter === 'wins')   return m.winner === pair;
    if (filter === 'losses') return m.winner !== '' && m.winner !== pair;
    return true;
  });

  const body = document.getElementById('modal-body');
  if (!filtered.length) {
    body.innerHTML = '<div class="modal-empty">Матчей нет</div>';
  } else {
    body.innerHTML = '';
    [...filtered].reverse().forEach(m => {
      const aWon = m.winner === m.pairA;
      const bWon = m.winner === m.pairB;
      const eloAHtml = m.eloA !== 0 ? `<span class="match-elo ${m.eloA>0?'elo-up':'elo-down'}">${m.eloA>0?'+':''}${m.eloA} ELO</span>` : '';
      const eloBHtml = m.eloB !== 0 ? `<span class="match-elo ${m.eloB>0?'elo-up':'elo-down'}">${m.eloB>0?'+':''}${m.eloB} ELO</span>` : '';
      const card = document.createElement('div');
      card.className = 'match-card';
      card.innerHTML = `
        <div class="match-header">
          <span class="match-num">Матч #${m.num}</span>
          <span class="match-date">${m.date}</span>
        </div>
        <div class="match-body">
          <div class="match-pair-col">
            <span class="match-pair ${aWon?'winner':bWon?'loser':''}">${m.pairA}</span>
            ${eloAHtml}
          </div>
          <div class="match-score-wrap">
            <div class="match-score">${m.score || '—'}</div>
            <div class="match-games">${m.games}</div>
          </div>
          <div class="match-pair-col right">
            <span class="match-pair right ${bWon?'winner':aWon?'loser':''}">${m.pairB}</span>
            ${eloBHtml}
          </div>
        </div>`;
      body.appendChild(card);
    });
  }
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  const el = document.getElementById('page-subtitle');
  if (name === 'rating') {
    el.innerHTML = 'Волгоградская<br><span style="color:var(--accent)">падел лига</span>';
  } else {
    el.innerHTML = '<span style="color:var(--accent)">Матчи</span>';
  }
}

function num(v) {
  if (v === null || v === undefined || v === '') return 0;
  return parseFloat(String(v).replace(/\s/g,'').replace(',','.')) || 0;
}

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res  = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  if (json.status === 'error') throw new Error(json.errors?.[0]?.message || 'Ошибка');
  return json.table.rows;
}

async function loadAll() {
  loadRating();
  loadMatches();
  document.getElementById('last-update').textContent =
    new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}) + ' ';
}

function sortBy(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  } else {
    sortCol = col;
    sortDir = 'desc';
  }
  // Update header indicators
  document.querySelectorAll('th.sortable').forEach(th => {
    th.classList.remove('asc', 'desc');
    if (th.dataset.col === col) th.classList.add(sortDir);
  });
  renderRating();
}

function renderRating() {
  const sorted = [...ratingData];
  if (sortCol) {
    sorted.sort((a, b) => {
      const av = a[sortCol], bv = b[sortCol];
      return sortDir === 'desc' ? bv - av : av - bv;
    });
  }

  const tbody = document.getElementById('rating-tbody');
  tbody.innerHTML = '';

  sorted.forEach((row, idx) => {
    const place = sortCol ? (idx + 1) : row.place;
    const wr = row.matches > 0 ? Math.round(row.wins / row.matches * 100) : 0;

    let ph;
    if (place===1) ph=`<span class="place-num p1">1</span>`;
    else if (place===2) ph=`<span class="place-num p2">2</span>`;
    else if (place===3) ph=`<span class="place-num p3">3</span>`;
    else ph=`<span class="place-num pn">${place}</span>`;

    const origPlace = row.place;
    const rc = origPlace===1?'top1':origPlace===2?'top2':origPlace===3?'top3':'';
    const tr = document.createElement('tr');
    if (rc && !sortCol) tr.className = rc;
    tr.innerHTML = `
      <td>${ph}</td>
      <td><span class="pair-name">${row.pair}</span></td>
      <td class="elo-val">${Math.round(row.elo) || '—'}</td>
      <td class="mono col-wins hide-sm"><span class="stat-clickable" onclick="openModal('${row.pair}','wins')">${row.wins}</span></td>
      <td class="mono col-losses hide-sm"><span class="stat-clickable" onclick="openModal('${row.pair}','losses')">${row.losses}</span></td>
      <td class="mono hide-sm"><span class="stat-clickable" onclick="openModal('${row.pair}','all')">${row.matches}</span></td>
      <td class="hide-sm">
        <div class="wr-wrap">
          <div class="wr-bar"><div class="wr-fill" style="width:${wr}%"></div></div>
          <span class="wr-pct">${row.matches>0?wr+'%':'—'}</span>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });
}

/* ── ELO ── */
const ELO_K = 32;
function eloExpected(a, b) { return 1 / (1 + Math.pow(10, (b - a) / 400)); }
function eloUpdate(rating, expected, score) { return rating + ELO_K * (score - expected); }

/* ── РЕЙТИНГ (считается из стартового рейтинга + история матчей) ── */
async function loadRating() {
  document.getElementById('rating-state').style.display = '';
  document.getElementById('rating-state').innerHTML = '<div class="spinner"></div>Загружаем рейтинг...';
  document.getElementById('rating-table').style.display = 'none';

  try {
    // Загружаем оба листа параллельно
    const [startRows, matchRows] = await Promise.all([
      fetchSheet('Стартовый рейтинг'),
      fetchSheet('Матчи'),
    ]);

    // --- Стартовый рейтинг: пара → ELO ---
    const eloMap = {};   // pair → текущий ELO
    const winsMap = {};
    const lossesMap = {};

    startRows.forEach(row => {
      const c    = row.c || [];
      const pair = String(c[0]?.v || '').trim();
      const elo  = num(c[1]?.f ?? c[1]?.v);
      if (pair && pair.includes('/')) {
        eloMap[pair]    = elo || 1000;
        winsMap[pair]   = 0;
        lossesMap[pair] = 0;
      }
    });

    // --- Матчи в хронологическом порядке ---
    const matches = matchRows
      .filter(r => {
        const c = r.c || [];
        return num(c[0]?.v) > 0 && c[2]?.v && c[3]?.v && String(c[2].v).includes('/');
      })
      .sort((a, b) => num(a.c?.[0]?.v) - num(b.c?.[0]?.v));

    matches.forEach(row => {
      const c      = row.c || [];
      const pairA  = String(c[2]?.v || '').trim();
      const pairB  = String(c[3]?.v || '').trim();
      const winner = String(c[6]?.v || '').trim();

      // Добавляем пару если её нет в стартовом рейтинге
      if (!(pairA in eloMap)) { eloMap[pairA] = 1000; winsMap[pairA] = 0; lossesMap[pairA] = 0; }
      if (!(pairB in eloMap)) { eloMap[pairB] = 1000; winsMap[pairB] = 0; lossesMap[pairB] = 0; }

      const rA = eloMap[pairA];
      const rB = eloMap[pairB];
      const expA = eloExpected(rA, rB);
      const expB = eloExpected(rB, rA);

      const scoreA = winner === pairA ? 1 : winner === pairB ? 0 : 0.5;
      const scoreB = 1 - scoreA;

      eloMap[pairA] = eloUpdate(rA, expA, scoreA);
      eloMap[pairB] = eloUpdate(rB, expB, scoreB);

      if (scoreA === 1) { winsMap[pairA]++; lossesMap[pairB]++; }
      else if (scoreB === 1) { winsMap[pairB]++; lossesMap[pairA]++; }
    });

    // --- Собираем итоговый рейтинг ---
    ratingData = Object.keys(eloMap).map(pair => {
      const wins    = winsMap[pair]   || 0;
      const losses  = lossesMap[pair] || 0;
      const mcount  = wins + losses;
      return { pair, elo: eloMap[pair], wins, losses, matches: mcount };
    });

    ratingData.sort((a, b) => b.elo - a.elo);
    ratingData.forEach((r, i) => r.place = i + 1);

    let maxElo = 0, totalElo = 0, totalMatches = 0;
    ratingData.forEach(r => {
      if (r.elo > maxElo) maxElo = r.elo;
      totalElo    += r.elo;
      totalMatches += r.matches;
    });

    document.getElementById('s-pairs').textContent      = ratingData.length;
    document.getElementById('s-matches').textContent    = Math.round(totalMatches / 2);
    document.getElementById('s-leader-elo').textContent = Math.round(maxElo);
    const avgElo = ratingData.length > 0 ? Math.round(totalElo / ratingData.length) : 0;
    document.getElementById('s-avg-elo').textContent    = avgElo || '—';

    document.getElementById('rating-state').style.display = 'none';
    document.getElementById('rating-table').style.display = '';
    renderRating();

  } catch(e) {
    document.getElementById('rating-state').innerHTML =
      `<span class="big">✕</span><span class="err-msg">${e.message}</span>`;
  }
}

/* ── МАТЧИ ── */
async function loadMatches() {
  document.getElementById('matches-state').style.display = '';
  document.getElementById('matches-state').innerHTML = '<div class="spinner"></div>Загружаем матчи...';
  document.getElementById('matches-list').innerHTML = '';

  try {
    const rows = await fetchSheet('Матчи');

    const matches = rows.filter(r => {
      const c = r.c || [];
      return num(c[0]?.v) > 0 && c[2]?.v && c[3]?.v && String(c[2].v).includes('/');
    });

    if (!matches.length) {
      document.getElementById('matches-state').innerHTML =
        '<span class="big">◎</span>Матчей пока нет';
      return;
    }

    const list = document.getElementById('matches-list');
    matchesData = [];
    [...matches].reverse().forEach(row => {
      const c       = row.c || [];
      const num_    = num(c[0]?.v);
      const date    = c[1]?.f || c[1]?.v || '';
      const pairA   = String(c[2]?.v || '').trim();
      const pairB   = String(c[3]?.v || '').trim();
      const score   = String(c[4]?.v || '').trim();
      const games   = String(c[5]?.v || '').trim();
      const winner  = String(c[6]?.v || '').trim();
      const eloA    = num(c[7]?.v);
      const eloB    = num(c[8]?.v);
      matchesData.push({ num: num_, date, pairA, pairB, score, games, winner, eloA, eloB });

      const aWon = winner === pairA;
      const bWon = winner === pairB;

      const eloAHtml = eloA !== 0
        ? `<span class="match-elo ${eloA>0?'elo-up':'elo-down'}">${eloA>0?'+':''}${eloA} ELO</span>`
        : '';
      const eloBHtml = eloB !== 0
        ? `<span class="match-elo ${eloB>0?'elo-up':'elo-down'}">${eloB>0?'+':''}${eloB} ELO</span>`
        : '';

      const card = document.createElement('div');
      card.className = 'match-card';
      card.innerHTML = `
        <div class="match-header">
          <span class="match-num">Матч #${num_}</span>
          <span class="match-date">${date}</span>
        </div>
        <div class="match-body">
          <div class="match-pair-col">
            <span class="match-pair ${aWon?'winner':bWon?'loser':''}">${pairA}</span>
            ${eloAHtml}
          </div>
          <div class="match-score-wrap">
            <div class="match-score">${score || '—'}</div>
            <div class="match-games">${games}</div>
          </div>
          <div class="match-pair-col right">
            <span class="match-pair right ${bWon?'winner':aWon?'loser':''}">${pairB}</span>
            ${eloBHtml}
          </div>
        </div>`;
      list.appendChild(card);
    });

    document.getElementById('matches-state').style.display = 'none';

  } catch(e) {
    document.getElementById('matches-state').innerHTML =
      `<span class="big">✕</span><span class="err-msg">${e.message}</span>`;
  }
}

loadAll();
</script>
