<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хайлайты — Волгоградская падел лига</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0f;
  --surface: #18181a;
  --border: rgba(255,255,255,0.08);
  --text: #f0ede8;
  --muted: #7a7975;
  --accent: #c8f060;
  --accent-dim: rgba(200,240,96,0.12);
  --red: #ff5f5f;
  --orange: #f5a742;
  --orange-dim: rgba(245,167,66,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 2rem 1.2rem 3rem; -webkit-font-smoothing: antialiased;
}
.title {
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.6rem, 6vw, 2.4rem);
  margin-bottom: 0.3rem; text-align: center;
}
.title span { color: var(--accent); }
.subtitle {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; text-align: center;
}
.conn-banner {
  width: 100%; max-width: 420px; text-align: center; font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  padding: 0.5rem; border-radius: 10px; margin-bottom: 1.2rem;
}
.conn-banner.online { color: var(--accent); background: var(--accent-dim); }
.conn-banner.offline { color: var(--orange); background: var(--orange-dim); }

.match-header {
  width: 100%; max-width: 420px; display: flex; align-items: center; justify-content: space-between;
  gap: 0.8rem; background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 1rem 1.1rem; margin-bottom: 1.2rem;
}
.mh-info { min-width: 0; }
.mh-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.25rem;
}
.mh-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; line-height: 1.15;
  overflow-wrap: anywhere;
}
.mh-meta {
  font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-top: 0.3rem;
}
.edit-btn {
  flex-shrink: 0; width: 42px; height: 42px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 12px; font-size: 17px; cursor: pointer; color: var(--text);
  display: flex; align-items: center; justify-content: center;
}
.edit-btn:active { transform: scale(0.94); }
.mh-hint {
  font-size: 11px; color: var(--muted); text-align: center; max-width: 420px;
  margin: -0.6rem 0 1rem; font-family: 'IBM Plex Sans', sans-serif;
}

.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65);
  align-items: center; justify-content: center; z-index: 1000; padding: 1.2rem;
}
.modal-overlay.open { display: flex; }
.modal-card {
  width: 100%; max-width: 420px; max-height: 78vh; background: var(--surface);
  border: 1px solid var(--border); border-radius: 18px; padding: 1.2rem;
  display: flex; flex-direction: column;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; margin-bottom: 0.4rem;
}
.assign-card {
  border: 1.5px solid var(--orange); box-shadow: 0 0 0 4px var(--orange-dim); text-align: center;
}
.assign-icon { font-size: 2.4rem; margin-bottom: 0.4rem; }
.assign-modal-title { font-size: 1.5rem; color: var(--orange); text-align: center; }
.assign-card .modal-subtitle { text-align: center; margin-bottom: 1rem; }
.assign-card .modal-list { text-align: left; }
.modal-subtitle {
  font-size: 12px; color: var(--muted); margin-bottom: 0.8rem;
}
.modal-list { overflow-y: auto; margin: -0.2rem 0 0.8rem; }
.modal-match-btn {
  width: 100%; text-align: left; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 12px; padding: 0.8rem 0.9rem; margin-bottom: 0.5rem;
  font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; cursor: pointer;
}
.modal-match-btn .mm-meta {
  display: block; font-size: 11px; color: var(--muted); margin-top: 0.2rem;
  font-family: 'IBM Plex Mono', monospace;
}
.modal-match-btn.active { border-color: var(--accent); background: var(--accent-dim); }
.modal-cancel-btn {
  width: 100%; background: transparent; border: 1px solid var(--border); color: var(--muted);
  border-radius: 12px; padding: 0.8rem; font-family: 'IBM Plex Mono', monospace; font-size: 12px;
  text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer;
}
.modal-done-btn {
  width: 100%; background: var(--accent); color: #0e0e0f; border: none;
  border-radius: 12px; padding: 0.85rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
  cursor: pointer; margin-bottom: 0.5rem;
}

.btn {
  width: 100%; max-width: 420px; background: var(--accent); color: #0e0e0f; border: none;
  border-radius: 16px; padding: 1.6rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
  letter-spacing: 0.02em; cursor: pointer; transition: transform 0.1s, opacity 0.2s;
}
.btn.offline-mode { background: var(--orange); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: default; }
.status {
  margin-top: 1rem; font-family: 'IBM Plex Mono', monospace; font-size: 13px;
  text-align: center; min-height: 1.2em;
}
.status.ok { color: var(--accent); }
.status.err { color: var(--red); }

.log {
  width: 100%; max-width: 420px; margin-top: 1.5rem;
}
.log-pending-header {
  display: flex; align-items: center; justify-content: space-between; gap: 0.6rem;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--orange);
  text-transform: uppercase; letter-spacing: 0.06em; padding: 0.2rem 0 0.6rem;
}
.send-all-inline-btn {
  flex-shrink: 0; background: var(--orange); color: #0e0e0f; border: none; border-radius: 8px;
  padding: 0.4rem 0.7rem; font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  font-weight: 500; cursor: pointer;
}
.send-all-inline-btn:disabled { opacity: 0.5; cursor: default; }

.log-item {
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted);
  padding: 0.5rem 0.6rem; border-bottom: 1px solid var(--border); display: flex;
  justify-content: space-between; align-items: center; gap: 0.5rem;
}
.log-item span:last-child { color: var(--accent); flex-shrink: 0; }

.log-item.pending {
  border: 1px solid var(--orange); border-radius: 10px; margin-bottom: 0.5rem;
  background: var(--orange-dim);
}
.log-item.pending .pi-info { min-width: 0; display: flex; flex-direction: column; gap: 0.1rem; }
.log-item.pending .pi-label {
  color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 12.5px;
  overflow-wrap: anywhere;
}
.log-item.pending .pi-time { color: var(--muted); font-size: 11px; }
.log-item.pending .pi-send {
  flex-shrink: 0; background: var(--accent); color: #0e0e0f; border: none; border-radius: 8px;
  padding: 0.45rem 0.7rem; font-family: 'IBM Plex Mono', monospace; font-size: 11px; cursor: pointer;
}
.log-item.pending .pi-send:disabled { opacity: 0.5; cursor: default; }

.log-item.unassigned {
  border: 1px dashed var(--border); border-radius: 10px; margin-bottom: 0.5rem;
  color: var(--muted); cursor: pointer;
}
</style>
</head>
<body>

<div class="title">🎬 <span>Хайлайт</span></div>
<div class="subtitle">Волгоградская падел лига</div>

<div class="conn-banner" id="conn-banner">проверяем связь…</div>

<div class="match-header" id="match-header">
  <div class="mh-info">
    <div class="mh-label">Матч</div>
    <div class="mh-title" id="mh-title">—</div>
    <div class="mh-meta" id="mh-meta"></div>
  </div>
  <button class="edit-btn" id="edit-btn" title="Изменить матч" aria-label="Изменить матч" style="display:none;">✏️</button>
</div>
<div class="mh-hint" id="mh-hint" style="display:none;">Матч определился неверно? Можно поменять ✏️</div>
<select id="match-select" style="display:none;"></select>

<div class="modal-overlay" id="match-modal-overlay">
  <div class="modal-card">
    <div class="modal-title">Выбери матч</div>
    <div class="modal-list" id="modal-match-list"></div>
    <button class="modal-cancel-btn" id="modal-cancel-btn">Отмена</button>
  </div>
</div>

<div class="modal-overlay" id="assign-modal-overlay">
  <div class="modal-card assign-card">
    <div class="assign-icon">🎬</div>
    <div class="modal-title assign-modal-title">Хайлайты без матча</div>
    <div class="modal-subtitle" id="assign-modal-subtitle">Выбери один матч для всех — потом отправим</div>
    <div class="modal-list" id="assign-modal-list"></div>
    <button class="modal-cancel-btn" id="assign-modal-later-btn">Позже</button>
  </div>
</div>

<button class="btn" id="mark-btn" disabled>Загрузка…</button>
<div class="status" id="status"></div>

<div class="log" id="log"></div>

<script>
const BACKEND = "https://aburtovoy-padel-helper-86a7.twc1.net";
const QUEUE_KEY = "padel_offline_highlights";

let matches = [];
let isOnline = false; // подтверждено реальным успешным запросом, а не только navigator.onLine
let sentLog = []; // {num, label, time} — успешно отправленные в этой сессии (для отображения в общем списке)
let sentCount = 0;

const bannerEl = document.getElementById('conn-banner');
const selectEl = document.getElementById('match-select');
const matchHeaderEl = document.getElementById('match-header');
const mhTitleEl = document.getElementById('mh-title');
const mhMetaEl = document.getElementById('mh-meta');
const editBtn = document.getElementById('edit-btn');
const mhHintEl = document.getElementById('mh-hint');
const modalOverlayEl = document.getElementById('match-modal-overlay');
const modalListEl = document.getElementById('modal-match-list');
const modalCancelBtn = document.getElementById('modal-cancel-btn');
const assignModalOverlayEl = document.getElementById('assign-modal-overlay');
const assignModalListEl = document.getElementById('assign-modal-list');
const assignModalLaterBtn = document.getElementById('assign-modal-later-btn');
const btnEl = document.getElementById('mark-btn');
const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');

// ---------- статус-строка с автоскрытием ----------
let statusHideTimer = null;
function showStatus(text, cls, autoHideMs = 2500) {
  statusEl.textContent = text;
  statusEl.className = 'status ' + cls;
  if (statusHideTimer) clearTimeout(statusHideTimer);
  if (autoHideMs) {
    statusHideTimer = setTimeout(() => {
      statusEl.textContent = '';
      statusEl.className = 'status';
    }, autoHideMs);
  }
}

// ---------- fetch с жёстким таймаутом ----------
// В авиарежиме/без сети fetch на многих телефонах не падает с ошибкой сразу,
// а зависает на системном таймауте (может быть 30+ секунд). Обрываем сами через 4с,
// иначе баннер "проверяем связь" висит бесконечно и офлайн-режим не включается.
async function fetchWithTimeout(url, options = {}, timeoutMs = 4000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    return await fetch(url, { ...options, signal: controller.signal });
  } finally {
    clearTimeout(timer);
  }
}

// ---------- офлайн-часы (всегда МСК/Волгоград, независимо от таймзоны устройства) ----------
function formatMoscowNow() {
  const now = new Date();
  const fmt = new Intl.DateTimeFormat('ru-RU', {
    timeZone: 'Europe/Moscow',
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
  });
  const p = fmt.formatToParts(now).reduce((acc, x) => { acc[x.type] = x.value; return acc; }, {});
  return `${p.day}.${p.month}.${p.year} ${p.hour}:${p.minute}:${p.second}`;
}
// парсит "дд.мм.гггг чч:мм:сс" в сравнимое число (для поиска ближайшего матча по времени)
function parseDT(str) {
  const [datePart, timePart] = (str || '').split(' ');
  const [d, mo, y] = (datePart || '').split('.').map(Number);
  const [h, mi, s] = (timePart || '0:0:0').split(':').map(Number);
  return Date.UTC(y || 2000, (mo || 1) - 1, d || 1, h || 0, mi || 0, s || 0);
}
function findClosestMatchIndex(ts) {
  if (matches.length === 0) return 0;
  const target = parseDT(ts);
  let best = 0, bestDiff = Infinity;
  matches.forEach((m, i) => {
    const diff = Math.abs(parseDT(m.date) - target);
    if (diff < bestDiff) { bestDiff = diff; best = i; }
  });
  return best;
}

// ---------- локальная очередь офлайн-хайлайтов ----------
// item: { id, ts, assigned: null | {label, date, pair_a, pair_b, venue} }
function getQueue() {
  try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch (e) { return []; }
}
function setQueue(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }
function addToQueue(ts) {
  const q = getQueue();
  q.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2, 7), ts, assigned: null });
  setQueue(q);
  return q;
}
function removeFromQueue(id) {
  setQueue(getQueue().filter((x) => x.id !== id));
}

// ---------- баннер связи ----------
function setConnBanner(online) {
  isOnline = online;
  bannerEl.className = 'conn-banner ' + (online ? 'online' : 'offline');
  bannerEl.textContent = online ? '🟢 На связи' : '🟠 Нет интернета — хайлайты сохраняются локально';
}

// ================= попап назначения матча для несинхронизированных хайлайтов =================
// Один выбор — сразу для всех несинканных хайлайтов (обычно они все с одного матча подряд).
function openAssignModal() {
  const unassigned = getQueue().filter((x) => !x.assigned);
  if (unassigned.length === 0 || matches.length === 0) return;

  const subtitleEl = document.getElementById('assign-modal-subtitle');
  subtitleEl.textContent = unassigned.length === 1
    ? 'Пока не знаем матч. Выбери его ниже — сразу отправим'
    : `Сохранили ${unassigned.length} шт. без интернета. Выбери матч ниже — сразу отправим все`;

  assignModalListEl.innerHTML = '';
  matches.forEach((m) => {
    const btn = document.createElement('button');
    btn.className = 'modal-match-btn';
    btn.innerHTML = `${m.label}<span class="mm-meta">${m.date}${m.venue ? ' · ' + m.venue : ''}</span>`;
    btn.addEventListener('click', async () => {
      const q = getQueue();
      const touchedIds = [];
      unassigned.forEach((item) => {
        const idx = q.findIndex((x) => x.id === item.id);
        if (idx !== -1) {
          q[idx].assigned = { label: m.label, date: m.date, pair_a: m.pair_a, pair_b: m.pair_b, venue: m.venue };
          touchedIds.push(item.id);
        }
      });
      setQueue(q);
      closeAssignModal();
      renderLog();
      showStatus(`Отправляю ${touchedIds.length}…`, 'ok', null);

      let ok = 0;
      for (const id of touchedIds) {
        const current = getQueue().find((x) => x.id === id);
        if (current && current.assigned && (await trySendItem(current))) ok++;
      }
      renderLog();
      if (ok === touchedIds.length) {
        showStatus(`✅ Отправлено: ${ok} · ${m.label}`, 'ok', 3000);
      } else {
        showStatus(`⚠️ Отправлено ${ok} из ${touchedIds.length}, остальное — кнопкой ниже`, 'err', 4000);
      }
    });
    assignModalListEl.appendChild(btn);
  });

  assignModalOverlayEl.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeAssignModal() {
  assignModalOverlayEl.classList.remove('open');
  document.body.style.overflow = '';
}

assignModalLaterBtn.addEventListener('click', closeAssignModal);
assignModalOverlayEl.addEventListener('click', (e) => { if (e.target === assignModalOverlayEl) closeAssignModal(); });

// ================= единый список внизу: несинканные (в рамке) + история этой сессии =================
async function trySendItem(item) {
  if (!item.assigned) return false;
  try {
    const res = await fetchWithTimeout(`${BACKEND}/highlights/mark`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        match_date: item.assigned.date, pair_a: item.assigned.pair_a,
        pair_b: item.assigned.pair_b, venue: item.assigned.venue,
        client_highlight_time: item.ts,
      }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error('bad response');
    removeFromQueue(item.id);
    sentCount++;
    sentLog.push({ num: sentCount, label: item.assigned.label, time: data.highlight_time });
    return true;
  } catch (e) {
    return false;
  }
}

function renderLog() {
  logEl.innerHTML = '';
  const q = getQueue();
  const pendingAssigned = q.filter((x) => x.assigned);
  const pendingUnassigned = q.filter((x) => !x.assigned);

  if (pendingAssigned.length > 0) {
    const header = document.createElement('div');
    header.className = 'log-pending-header';
    const label = document.createElement('span');
    label.textContent = `⏳ Несинхронизированные (${pendingAssigned.length})`;
    const allBtn = document.createElement('button');
    allBtn.className = 'send-all-inline-btn';
    allBtn.textContent = 'Отправить все';
    allBtn.disabled = !isOnline;
    allBtn.addEventListener('click', async () => {
      allBtn.disabled = true;
      allBtn.textContent = 'Отправляю…';
      for (const it of getQueue().filter((x) => x.assigned)) {
        await trySendItem(it);
      }
      renderLog();
    });
    header.appendChild(label);
    header.appendChild(allBtn);
    logEl.appendChild(header);

    pendingAssigned.slice().reverse().forEach((item) => {
      const row = document.createElement('div');
      row.className = 'log-item pending';

      const info = document.createElement('div');
      info.className = 'pi-info';
      const labelDiv = document.createElement('div');
      labelDiv.className = 'pi-label';
      labelDiv.textContent = item.assigned.label;
      const timeDiv = document.createElement('div');
      timeDiv.className = 'pi-time';
      timeDiv.textContent = item.ts.split(' ')[1] || item.ts;
      info.appendChild(labelDiv);
      info.appendChild(timeDiv);

      const sendBtn = document.createElement('button');
      sendBtn.className = 'pi-send';
      sendBtn.textContent = 'Отправить';
      sendBtn.disabled = !isOnline;
      sendBtn.addEventListener('click', async () => {
        sendBtn.disabled = true;
        sendBtn.textContent = '…';
        const ok = await trySendItem(item);
        if (ok) { renderLog(); } else { sendBtn.disabled = false; sendBtn.textContent = 'Ошибка, ещё раз'; }
      });

      row.appendChild(info);
      row.appendChild(sendBtn);
      logEl.appendChild(row);
    });
  }

  if (pendingUnassigned.length > 0) {
    pendingUnassigned.slice().reverse().forEach((item) => {
      const row = document.createElement('div');
      row.className = 'log-item unassigned';
      row.innerHTML = `<span>⏳ ждёт выбора матча</span><span>${item.ts.split(' ')[1] || item.ts}</span>`;
      row.addEventListener('click', openAssignModal);
      logEl.appendChild(row);
    });
  }

  sentLog.slice().reverse().forEach((entry) => {
    const div = document.createElement('div');
    div.className = 'log-item';
    div.innerHTML = `<span>#${entry.num} · ${entry.label}</span><span>${entry.time.split(' ')[1] || entry.time}</span>`;
    logEl.appendChild(div);
  });
}

// ================= матч как заголовок + модалка редактирования текущего выбора =================
function renderMatchHeader() {
  const m = matches[selectEl.selectedIndex];
  if (!m) {
    mhTitleEl.textContent = matches.length === 0 && !isOnline ? 'Определим при синхронизации' : '—';
    mhMetaEl.textContent = '';
    return;
  }
  mhTitleEl.textContent = m.label;
  mhMetaEl.textContent = `${m.date}${m.venue ? ' · ' + m.venue : ''}`;
}

function openMatchModal() {
  modalListEl.innerHTML = '';
  matches.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'modal-match-btn' + (i === selectEl.selectedIndex ? ' active' : '');
    btn.innerHTML = `${m.label}<span class="mm-meta">${m.date}${m.venue ? ' · ' + m.venue : ''}</span>`;
    btn.addEventListener('click', () => {
      selectEl.selectedIndex = i;
      renderMatchHeader();
      closeMatchModal();
    });
    modalListEl.appendChild(btn);
  });
  modalOverlayEl.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeMatchModal() {
  modalOverlayEl.classList.remove('open');
  document.body.style.overflow = '';
}

editBtn.addEventListener('click', openMatchModal);
modalCancelBtn.addEventListener('click', closeMatchModal);
modalOverlayEl.addEventListener('click', (e) => { if (e.target === modalOverlayEl) closeMatchModal(); });
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  closeMatchModal();
  closeAssignModal();
});

function applyModeToButton() {
  if (matches.length === 0 && !isOnline) {
    matchHeaderEl.style.display = 'none';
    mhHintEl.style.display = 'none';
    editBtn.style.display = 'none';
    btnEl.classList.add('offline-mode');
    btnEl.textContent = '🎬 Зафиксировать хайлайт (офлайн)';
    btnEl.disabled = false;
  } else if (matches.length === 0) {
    matchHeaderEl.style.display = 'none';
    mhHintEl.style.display = 'none';
    closeMatchModal();
    btnEl.textContent = 'Сегодня матчей нет';
    btnEl.disabled = true;
  } else {
    matchHeaderEl.style.display = '';
    mhHintEl.style.display = '';
    editBtn.style.display = '';
    btnEl.classList.remove('offline-mode');
    btnEl.textContent = '🎬 Зафиксировать хайлайт';
    btnEl.disabled = false;
  }
}

async function loadMatches() {
  let justCameOnline = false;
  try {
    const res = await fetchWithTimeout(`${BACKEND}/highlights/matches`);
    const data = await res.json();
    matches = data.matches || [];
    justCameOnline = !isOnline;
    setConnBanner(true);
    selectEl.innerHTML = '';
    matches.forEach((m, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = m.label;
      selectEl.appendChild(opt);
    });
    renderMatchHeader();
  } catch (e) {
    setConnBanner(false);
  }
  applyModeToButton();
  renderLog();
  // Только что появилась связь и есть хайлайты без матча — сразу предлагаем разобрать
  if (justCameOnline && getQueue().some((x) => !x.assigned)) {
    openAssignModal();
  }
}

btnEl.addEventListener('click', async () => {
  const tsAtClick = formatMoscowNow();

  // офлайн-режим (страница уже знает, что связи нет, или матчей нет в кэше) — просто копим локально
  if (!isOnline) {
    addToQueue(tsAtClick);
    renderLog();
    showStatus(`📴 Сохранено локально: ${tsAtClick.split(' ')[1]}`, 'ok', 2000);
    return;
  }

  const m = matches[selectEl.selectedIndex];
  if (!m) return;
  btnEl.disabled = true;
  btnEl.textContent = 'Записываю…';
  try {
    const res = await fetchWithTimeout(`${BACKEND}/highlights/mark`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ match_date: m.date, pair_a: m.pair_a, pair_b: m.pair_b, venue: m.venue }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error('bad response');
    sentCount++;
    sentLog.push({ num: sentCount, label: m.label, time: data.highlight_time });
    showStatus(`✅ Записано: ${data.highlight_time}`, 'ok', 2000);
    renderLog();
  } catch (e) {
    // Сеть отвалилась прямо во время отправки — не теряем хайлайт, кладём в офлайн-очередь
    addToQueue(tsAtClick);
    renderLog();
    setConnBanner(false);
    showStatus(`📴 Не отправилось, сохранил локально: ${tsAtClick.split(' ')[1]}`, 'err', 3000);
  } finally {
    applyModeToButton();
  }
});

window.addEventListener('online', () => loadMatches());
window.addEventListener('offline', () => { setConnBanner(false); applyModeToButton(); renderLog(); });

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

loadMatches();
</script>

</body>
</html>
