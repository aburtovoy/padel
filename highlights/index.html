<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хайлайты — Волгоградская падел лига</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0f;
  --surface: #18181a;
  --border: rgba(255,255,255,0.08);
  --text: #f0ede8;
  --muted: #7a7975;
  --accent: #c8f060;
  --accent-dim: rgba(200,240,96,0.12);
  --red: #ff5f5f;
  --orange: #f5a742;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 2rem 1.2rem 3rem; -webkit-font-smoothing: antialiased;
}
.title {
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.6rem, 6vw, 2.4rem);
  margin-bottom: 0.3rem; text-align: center;
}
.title span { color: var(--accent); }
.subtitle {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; text-align: center;
}
.conn-banner {
  width: 100%; max-width: 420px; text-align: center; font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  padding: 0.5rem; border-radius: 10px; margin-bottom: 1.2rem;
}
.conn-banner.online { color: var(--accent); background: var(--accent-dim); }
.conn-banner.offline { color: var(--orange); background: rgba(245,167,66,0.12); }

.sync-card {
  width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--orange);
  border-radius: 16px; padding: 1.2rem; margin-bottom: 1.2rem;
}
.sync-title {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--orange);
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.8rem;
}
.sync-item {
  display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.6rem;
}
.sync-item .ts {
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted);
  min-width: 68px; flex-shrink: 0;
}
.sync-item select {
  flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.5rem 0.4rem; font-size: 12px; min-width: 0;
}
.sync-item button {
  flex-shrink: 0; border: none; border-radius: 8px; padding: 0.5rem 0.6rem;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; cursor: pointer;
}
.sync-item .send-btn { background: var(--accent); color: #0e0e0f; }
.sync-item .discard-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.sync-item.done .ts, .sync-item.done select { opacity: 0.4; }
.sync-all-btn {
  width: 100%; background: var(--orange); color: #0e0e0f; border: none; border-radius: 10px;
  padding: 0.7rem; font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500;
  cursor: pointer; margin-top: 0.4rem;
}

.card {
  width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 1.5rem; margin-bottom: 1.2rem;
}
.label {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; display: block;
}
select {
  width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border);
  border-radius: 10px; padding: 0.8rem 0.9rem; font-family: 'IBM Plex Sans', sans-serif;
  font-size: 15px; appearance: none;
}
.match-meta {
  font-size: 12px; color: var(--muted); margin-top: 0.6rem; font-family: 'IBM Plex Mono', monospace;
}
.btn {
  width: 100%; max-width: 420px; background: var(--accent); color: #0e0e0f; border: none;
  border-radius: 16px; padding: 1.6rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
  letter-spacing: 0.02em; cursor: pointer; transition: transform 0.1s, opacity 0.2s;
}
.btn.offline-mode { background: var(--orange); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: default; }
.status {
  margin-top: 1rem; font-family: 'IBM Plex Mono', monospace; font-size: 13px;
  text-align: center; min-height: 1.2em;
}
.status.ok { color: var(--accent); }
.status.err { color: var(--red); }
.log {
  width: 100%; max-width: 420px; margin-top: 1.5rem;
}
.log-item {
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted);
  padding: 0.4rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;
}
.log-item span:last-child { color: var(--accent); }
</style>
</head>
<body>

<div class="title">🎬 <span>Хайлайт</span></div>
<div class="subtitle">Волгоградская падел лига</div>

<div class="conn-banner" id="conn-banner">проверяем связь…</div>

<div class="sync-card" id="sync-card" style="display:none;">
  <div class="sync-title">⏳ Несинхронизированные хайлайты</div>
  <div id="sync-list"></div>
  <button class="sync-all-btn" id="sync-all-btn">Отправить все</button>
</div>

<div class="card" id="match-card">
  <span class="label">Матч</span>
  <select id="match-select"></select>
  <div class="match-meta" id="match-meta"></div>
</div>

<button class="btn" id="mark-btn" disabled>Загрузка…</button>
<div class="status" id="status"></div>

<div class="log" id="log"></div>

<script>
const BACKEND = "https://aburtovoy-padel-helper-86a7.twc1.net";
const QUEUE_KEY = "padel_offline_highlights";

let matches = [];
let isOnline = false; // подтверждено реальным успешным запросом, а не только navigator.onLine
let clickCount = 0;

const bannerEl = document.getElementById('conn-banner');
const selectEl = document.getElementById('match-select');
const matchCardEl = document.getElementById('match-card');
const metaEl = document.getElementById('match-meta');
const btnEl = document.getElementById('mark-btn');
const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');
const syncCardEl = document.getElementById('sync-card');
const syncListEl = document.getElementById('sync-list');
const syncAllBtn = document.getElementById('sync-all-btn');

// ---------- офлайн-часы (всегда МСК/Волгоград, независимо от таймзоны устройства) ----------
function formatMoscowNow() {
  const now = new Date();
  const fmt = new Intl.DateTimeFormat('ru-RU', {
    timeZone: 'Europe/Moscow',
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
  });
  const p = fmt.formatToParts(now).reduce((acc, x) => { acc[x.type] = x.value; return acc; }, {});
  return `${p.day}.${p.month}.${p.year} ${p.hour}:${p.minute}:${p.second}`;
}

// ---------- локальная очередь офлайн-хайлайтов ----------
function getQueue() {
  try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch (e) { return []; }
}
function setQueue(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }
function addToQueue(ts) {
  const q = getQueue();
  q.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2, 7), ts });
  setQueue(q);
  return q;
}
function removeFromQueue(id) {
  setQueue(getQueue().filter((x) => x.id !== id));
}

// ---------- баннер связи ----------
function setConnBanner(online) {
  isOnline = online;
  bannerEl.className = 'conn-banner ' + (online ? 'online' : 'offline');
  bannerEl.textContent = online ? '🟢 На связи' : '🟠 Нет интернета — хайлайты сохраняются локально';
}

// ---------- рендер очереди на синхронизацию ----------
function renderSyncPanel() {
  const q = getQueue();
  if (!isOnline || q.length === 0 || matches.length === 0) {
    syncCardEl.style.display = 'none';
    return;
  }
  syncCardEl.style.display = '';
  syncListEl.innerHTML = '';
  q.forEach((item) => {
    const row = document.createElement('div');
    row.className = 'sync-item';
    row.dataset.id = item.id;

    const ts = document.createElement('span');
    ts.className = 'ts';
    ts.textContent = (item.ts.split(' ')[1] || item.ts);

    const sel = document.createElement('select');
    matches.forEach((m, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = m.label;
      sel.appendChild(opt);
    });

    const sendBtn = document.createElement('button');
    sendBtn.className = 'send-btn';
    sendBtn.textContent = 'Отправить';
    sendBtn.addEventListener('click', () => syncOne(item, sel, row, sendBtn));

    const discardBtn = document.createElement('button');
    discardBtn.className = 'discard-btn';
    discardBtn.textContent = '✕';
    discardBtn.title = 'Не отправлять этот хайлайт';
    discardBtn.addEventListener('click', () => { removeFromQueue(item.id); renderSyncPanel(); });

    row.appendChild(ts);
    row.appendChild(sel);
    row.appendChild(sendBtn);
    row.appendChild(discardBtn);
    syncListEl.appendChild(row);
  });
}

async function syncOne(item, sel, row, sendBtn) {
  const m = matches[sel.selectedIndex];
  if (!m) return;
  sendBtn.disabled = true;
  sendBtn.textContent = '…';
  try {
    const res = await fetch(`${BACKEND}/highlights/mark`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        match_date: m.date, pair_a: m.pair_a, pair_b: m.pair_b, venue: m.venue,
        client_highlight_time: item.ts,
      }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error('bad response');
    removeFromQueue(item.id);
    row.classList.add('done');
    sendBtn.textContent = '✓';
  } catch (e) {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Ошибка, ещё раз';
  }
}

syncAllBtn.addEventListener('click', async () => {
  const rows = [...syncListEl.querySelectorAll('.sync-item:not(.done)')];
  for (const row of rows) {
    const id = row.dataset.id;
    const item = getQueue().find((x) => x.id === id);
    if (!item) continue;
    const sel = row.querySelector('select');
    const sendBtn = row.querySelector('.send-btn');
    await syncOne(item, sel, row, sendBtn);
  }
  setTimeout(renderSyncPanel, 400);
});

// ---------- основная форма ----------
function renderMeta() {
  const m = matches[selectEl.selectedIndex];
  if (!m) { metaEl.textContent = ''; return; }
  metaEl.textContent = `${m.date}${m.venue ? ' · ' + m.venue : ''}`;
}
selectEl.addEventListener('change', renderMeta);

function applyModeToButton() {
  if (matches.length === 0 && !isOnline) {
    matchCardEl.style.display = 'none';
    btnEl.classList.add('offline-mode');
    btnEl.textContent = '🎬 Зафиксировать хайлайт (офлайн)';
    btnEl.disabled = false;
  } else if (matches.length === 0) {
    btnEl.textContent = 'Сегодня матчей нет';
    btnEl.disabled = true;
  } else {
    matchCardEl.style.display = '';
    btnEl.classList.remove('offline-mode');
    btnEl.textContent = '🎬 Зафиксировать хайлайт';
    btnEl.disabled = false;
  }
}

async function loadMatches() {
  try {
    const res = await fetch(`${BACKEND}/highlights/matches`);
    const data = await res.json();
    matches = data.matches || [];
    setConnBanner(true);
    selectEl.innerHTML = '';
    matches.forEach((m, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = m.label;
      selectEl.appendChild(opt);
    });
    renderMeta();
  } catch (e) {
    setConnBanner(false);
  }
  applyModeToButton();
  renderSyncPanel();
}

btnEl.addEventListener('click', async () => {
  const tsAtClick = formatMoscowNow();

  // офлайн-режим (страница уже знает, что связи нет, или матчей нет в кэше) — просто копим локально
  if (!isOnline) {
    addToQueue(tsAtClick);
    statusEl.textContent = `📴 Сохранено локально: ${tsAtClick.split(' ')[1]}. Матч выберешь при следующем заходе с интернетом`;
    statusEl.className = 'status ok';
    return;
  }

  const m = matches[selectEl.selectedIndex];
  if (!m) return;
  btnEl.disabled = true;
  btnEl.textContent = 'Записываю…';
  try {
    const res = await fetch(`${BACKEND}/highlights/mark`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ match_date: m.date, pair_a: m.pair_a, pair_b: m.pair_b, venue: m.venue }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error('bad response');
    clickCount++;
    statusEl.textContent = `✅ Записано: ${data.highlight_time}`;
    statusEl.className = 'status ok';
    const item = document.createElement('div');
    item.className = 'log-item';
    item.innerHTML = `<span>#${clickCount} · ${m.label}</span><span>${data.highlight_time.split(' ')[1] || data.highlight_time}</span>`;
    logEl.prepend(item);
  } catch (e) {
    // Сеть отвалилась прямо во время отправки — не теряем хайлайт, кладём в офлайн-очередь
    addToQueue(tsAtClick);
    setConnBanner(false);
    statusEl.textContent = `📴 Не отправилось, сохранил локально: ${tsAtClick.split(' ')[1]}`;
    statusEl.className = 'status err';
  } finally {
    applyModeToButton();
  }
});

window.addEventListener('online', () => loadMatches());
window.addEventListener('offline', () => { setConnBanner(false); applyModeToButton(); renderSyncPanel(); });

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

loadMatches();
</script>

</body>
</html>
